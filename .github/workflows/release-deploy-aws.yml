name: Release Deploy (AWS)

on:
  release:
    types:
      - published

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  S3_BUCKET: ${{ vars.AWS_S3_BUCKET }}
  CLOUDFRONT_DISTRIBUTION_ID: ${{ vars.AWS_CLOUDFRONT_DISTRIBUTION_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Write runtime config
        env:
          APP_CONFIG_JSON: ${{ secrets.APP_CONFIG_JSON }}
        run: |
          if [ -z "$APP_CONFIG_JSON" ]; then
            echo "APP_CONFIG_JSON secret is required." >&2
            exit 1
          fi

          printf '%s' "$APP_CONFIG_JSON" > dist/config.json
          jq empty dist/config.json

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify deploy variables
        run: |
          test -n "$AWS_REGION"
          test -n "$S3_BUCKET"
          test -n "$CLOUDFRONT_DISTRIBUTION_ID"

      - name: Sync static assets to S3
        run: aws s3 sync dist/ "s3://${S3_BUCKET}" --delete

      - name: Prevent stale runtime config caching
        run: |
          aws s3 cp dist/config.json "s3://${S3_BUCKET}/config.json" \
            --content-type application/json \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "$CLOUDFRONT_DISTRIBUTION_ID" \
            --paths "/*"
